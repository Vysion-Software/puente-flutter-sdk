name: puente_railway
version: 0.2.0
description: >-
  Official Dart/Flutter SDK for Puente Railway — the Solana + Etherfuse
  settlement rail behind Pesito. Send USD→MXN remittances, fetch quotes,
  verify webhooks, and stream transfer state. Pure Dart core; works in
  Flutter, server, and CLI contexts.
homepage: https://github.com/Vysion-Software/puente-flutter-sdk
repository: https://github.com/Vysion-Software/puente-flutter-sdk
issue_tracker: https://github.com/Vysion-Software/puente-flutter-sdk/issues
documentation: https://github.com/Vysion-Software/puente-flutter-sdk#readme
topics:
  - payments
  - fintech
  - remittance
  - cross-border
  - solana
platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  http: ^1.2.0
  json_annotation: ^4.9.0
  crypto: ^3.0.3
  equatable: ^2.0.5
  meta: ^1.15.0
  uuid: ^4.5.0
  clock: ^1.1.1

dev_dependencies:
  build_runner: ^2.4.0
  json_serializable: ^6.8.0
  test: ^1.25.0
  lints: ^4.0.0
  fake_async: ^1.3.1
